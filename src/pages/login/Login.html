<section class="login-page">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-12 col-md-8 col-lg-5">
        <div class="login-card eb-glass eb-rise eb-delay-1">
          <div class="text-center mb-4">
            <div class="eb-icon-badge mx-auto mb-3" data-auth-icon>
              <i class="bi bi-box-arrow-in-right"></i>
            </div>
            <h1 class="login-card__title" data-auth-title>Welcome back</h1>
            <p class="text-eb-muted mb-0" data-auth-subtitle>Login to book your next event.</p>
          </div>

          <div class="login-tabs" role="tablist">
            <button
              type="button"
              class="login-tabs__btn active"
              data-tab="login"
              role="tab"
              aria-selected="true"
            >
              Login
            </button>
            <button
              type="button"
              class="login-tabs__btn"
              data-tab="register"
              role="tab"
              aria-selected="false"
            >
              Register
            </button>
          </div>

          <div class="login-alert d-none" data-alert role="alert"></div>

          <form class="login-form" data-form="login" novalidate>
            <div class="mb-3">
              <label class="form-label" for="login-email">Email</label>
              <div class="input-group login-input">
                <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                <input
                  type="email"
                  class="form-control"
                  id="login-email"
                  name="email"
                  placeholder="you@example.com"
                  autocomplete="email"
                  required
                />
              </div>
            </div>

            <div class="mb-4">
              <label class="form-label" for="login-password">Password</label>
              <div class="input-group login-input">
                <span class="input-group-text"><i class="bi bi-lock"></i></span>
                <input
                  type="password"
                  class="form-control"
                  id="login-password"
                  name="password"
                  placeholder="••••••••"
                  autocomplete="current-password"
                  required
                  minlength="6"
                />
              </div>
            </div>

            <button type="submit" class="btn-eb w-100" data-submit-btn>
              <i class="bi bi-box-arrow-in-right me-2"></i>Login to book a event
            </button>
          </form>

          <form class="register-form d-none" data-form="register" novalidate>
            <div class="mb-3">
              <label class="form-label" for="register-email">Email</label>
              <div class="input-group login-input">
                <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                <input
                  type="email"
                  class="form-control"
                  id="register-email"
                  name="email"
                  placeholder="you@example.com"
                  autocomplete="email"
                  required
                />
              </div>
            </div>

            <div class="mb-3">
              <label class="form-label" for="register-password">Password</label>
              <div class="input-group login-input">
                <span class="input-group-text"><i class="bi bi-lock"></i></span>
                <input
                  type="password"
                  class="form-control"
                  id="register-password"
                  name="password"
                  placeholder="At least 6 characters"
                  autocomplete="new-password"
                  required
                  minlength="6"
                />
              </div>
            </div>

            <div class="mb-4">
              <label class="form-label" for="register-confirm">Confirm password</label>
              <div class="input-group login-input">
                <span class="input-group-text"><i class="bi bi-shield-lock"></i></span>
                <input
                  type="password"
                  class="form-control"
                  id="register-confirm"
                  name="confirmPassword"
                  placeholder="Repeat password"
                  autocomplete="new-password"
                  required
                  minlength="6"
                />
              </div>
            </div>

            <button type="submit" class="btn-eb w-100" data-submit-btn>
              <i class="bi bi-person-plus me-2"></i>Create account
            </button>
          </form>

          <p class="text-center text-eb-muted login-card__foot">
            <a href="/" data-route class="login-card__link">← Back to home</a>
          </p>
        </div>
      </div>
    </div>
  </div>
</section>
