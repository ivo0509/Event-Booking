<section class="login-page">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-12 col-md-8 col-lg-5">
        <div class="login-card eb-glass eb-rise eb-delay-1">
          <div class="text-center mb-4">
            <div class="eb-icon-badge mx-auto mb-3"><i class="bi bi-box-arrow-in-right"></i></div>
            <h1 class="login-card__title">Welcome back</h1>
            <p class="text-eb-muted mb-0">Login to book your next event.</p>
          </div>

          <form class="login-form" novalidate>
            <div class="mb-3">
              <label class="form-label" for="login-email">Email</label>
              <div class="input-group login-input">
                <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                <input
                  type="email"
                  class="form-control"
                  id="login-email"
                  placeholder="you@example.com"
                  autocomplete="email"
                />
              </div>
            </div>

            <div class="mb-4">
              <label class="form-label" for="login-password">Password</label>
              <div class="input-group login-input">
                <span class="input-group-text"><i class="bi bi-lock"></i></span>
                <input
                  type="password"
                  class="form-control"
                  id="login-password"
                  placeholder="••••••••"
                  autocomplete="current-password"
                />
              </div>
            </div>

            <button type="submit" class="btn-eb w-100">
              <i class="bi bi-box-arrow-in-right me-2"></i>Login to book a event
            </button>
          </form>

          <p class="text-center text-eb-muted login-card__foot">
            New here? <a href="/" data-route class="login-card__link">Explore events first</a>
          </p>
        </div>
      </div>
    </div>
  </div>
</section>
