<section class="event-form-page">
  <div class="container">
    <div class="event-form-head eb-rise eb-delay-1">
      <a href="/events" data-route class="event-form__back text-eb-muted">
        <i class="bi bi-arrow-left me-1"></i>Back to events
      </a>
      <h1 class="event-form-head__title" data-form-title>Add event</h1>
      <p class="text-eb-muted mb-0" data-form-subtitle>Create a new event for others to book.</p>
    </div>

    <div class="event-form-card eb-glass eb-rise eb-delay-2">
      <form class="event-form" novalidate>
        <div class="row g-3">
          <div class="col-12">
            <label class="form-label" for="event-title">Title</label>
            <input type="text" class="form-control" id="event-title" name="title" required />
          </div>

          <div class="col-12">
            <label class="form-label" for="event-description">Description</label>
            <textarea class="form-control" id="event-description" name="description" rows="4"></textarea>
          </div>

          <div class="col-md-6">
            <label class="form-label" for="event-location">Location</label>
            <input type="text" class="form-control" id="event-location" name="location" required />
          </div>

          <div class="col-md-6">
            <label class="form-label" for="event-category">Category</label>
            <select class="form-select" id="event-category" name="category" required data-category-select></select>
          </div>

          <div class="col-md-6">
            <label class="form-label" for="event-date">Event date &amp; time</label>
            <input type="datetime-local" class="form-control" id="event-date" name="eventDate" required />
          </div>

          <div class="col-md-6">
            <label class="form-label" for="event-capacity">Capacity</label>
            <input type="number" class="form-control" id="event-capacity" name="capacity" min="1" required />
          </div>
        </div>

        <div class="event-form__actions">
          <a href="/events" data-route class="btn-eb-outline">Cancel</a>
          <button type="submit" class="btn-eb" data-submit-btn>
            <i class="bi bi-check2 me-2"></i>Save event
          </button>
        </div>
      </form>
    </div>
  </div>
</section>
