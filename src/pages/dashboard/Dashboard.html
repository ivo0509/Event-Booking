<section class="dashboard-page">
  <div class="container">
    <div class="dashboard-head eb-rise eb-delay-1">
      <div>
        <span class="eb-chip mb-3"><i class="bi bi-house-door"></i> Home</span>
        <h1 class="dashboard-head__title">Your dashboard</h1>
        <p class="text-eb-muted mb-0">Overview of your events and categories.</p>
      </div>
    </div>

    <div class="dashboard-total eb-rise eb-delay-2" data-total-events>
      <div class="dashboard-total__loading text-eb-muted">
        <span class="spinner-border spinner-border-sm me-2"></span>Loading events…
      </div>
    </div>

    <div class="dashboard-section eb-rise eb-delay-3">
      <h2 class="dashboard-section__title">Events by category</h2>
      <p class="text-eb-muted dashboard-section__lead">Concerts, sports, conferences and workshops you manage.</p>
      <div class="row g-4" data-category-stats>
        <div class="col-12 text-eb-muted">
          <span class="spinner-border spinner-border-sm me-2"></span>Loading categories…
        </div>
      </div>
    </div>
  </div>
</section>
