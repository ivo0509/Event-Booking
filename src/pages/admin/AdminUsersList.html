<section class="admin-page">
  <div class="container">
    <div class="admin-head eb-rise eb-delay-1">
      <span class="eb-chip mb-3"><i class="bi bi-shield-lock"></i> Admin</span>
      <h1 class="admin-head__title">Manage users</h1>
      <p class="text-eb-muted mb-0">View and manage all registered users.</p>
    </div>

    <nav class="admin-nav eb-rise eb-delay-2" data-admin-nav>
      <a href="/admin" data-route class="admin-nav__link">Overview</a>
      <a href="/admin/events" data-route class="admin-nav__link" data-admin-nav-link="events">Events</a>
      <a href="/admin/users" data-route class="admin-nav__link active" data-admin-nav-link="users">Users</a>
    </nav>

    <div class="admin-table-wrap eb-glass eb-rise eb-delay-3">
      <div class="admin-table-scroll">
        <table class="table admin-table align-middle">
          <thead>
            <tr>
              <th>Email</th>
              <th>Name</th>
              <th>Role</th>
              <th>Joined</th>
              <th class="text-end">Actions</th>
            </tr>
          </thead>
          <tbody data-admin-users-table>
            <tr>
              <td colspan="5" class="text-center text-eb-muted py-5">
                <span class="spinner-border spinner-border-sm me-2"></span>Loading users…
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="modal fade" id="adminDeleteUserModal" tabindex="-1" aria-labelledby="adminDeleteUserModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content eb-glass">
        <div class="modal-header border-secondary border-opacity-25">
          <h5 class="modal-title" id="adminDeleteUserModalLabel">Delete user</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <p class="mb-2">Are you sure you want to delete this user? This will remove their account and bookings.</p>
          <p class="fw-semibold mb-0" data-delete-user-email></p>
        </div>
        <div class="modal-footer border-secondary border-opacity-25">
          <button type="button" class="btn-eb-outline" data-bs-dismiss="modal">Cancel</button>
          <button type="button" class="btn btn-danger" data-confirm-delete>Delete user</button>
        </div>
      </div>
    </div>
  </div>
</section>
