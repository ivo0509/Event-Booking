<section class="admin-page">
  <div class="container">
    <div class="admin-head eb-rise eb-delay-1">
      <a href="/admin/events" data-route class="event-form__back text-eb-muted mb-3 d-inline-block">
        <i class="bi bi-arrow-left me-1"></i>Back to events
      </a>
      <span class="eb-chip mb-3"><i class="bi bi-shield-lock"></i> Admin</span>
      <h1 class="admin-head__title" data-event-title>Event details</h1>
    </div>

    <div data-admin-event-detail>
      <div class="eb-glass p-5 text-center text-eb-muted">
        <span class="spinner-border spinner-border-sm me-2"></span>Loading event…
      </div>
    </div>
  </div>

  <div class="modal fade" id="adminEventDetailDeleteModal" tabindex="-1" aria-labelledby="adminEventDetailDeleteModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content eb-glass">
        <div class="modal-header border-secondary border-opacity-25">
          <h5 class="modal-title" id="adminEventDetailDeleteModalLabel">Delete event</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <p class="mb-2">Are you sure you want to delete this event?</p>
          <p class="fw-semibold mb-0" data-delete-event-title></p>
        </div>
        <div class="modal-footer border-secondary border-opacity-25">
          <button type="button" class="btn-eb-outline" data-bs-dismiss="modal">Cancel</button>
          <button type="button" class="btn btn-danger" data-confirm-delete>Delete event</button>
        </div>
      </div>
    </div>
  </div>
</section>
