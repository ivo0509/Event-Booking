<section class="event-detail-page">
  <div class="event-detail-page__scroll">
    <div class="container">
      <div class="event-detail__head eb-rise eb-delay-1">
        <a href="/events" data-route class="event-detail__back text-eb-muted">
          <i class="bi bi-arrow-left me-1"></i>Back to events
        </a>
      </div>

      <div data-event-detail>
        <div class="text-center text-eb-muted py-5">
          <span class="spinner-border spinner-border-sm me-2"></span>Loading event…
        </div>
      </div>
    </div>
  </div>

  <div class="modal fade" id="deleteEventDetailModal" tabindex="-1" aria-labelledby="deleteEventDetailModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content eb-glass">
        <div class="modal-header border-secondary border-opacity-25">
          <h5 class="modal-title" id="deleteEventDetailModalLabel">Delete event</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <p class="mb-2">Are you sure you want to delete this event?</p>
          <p class="fw-semibold mb-0" data-delete-event-title></p>
        </div>
        <div class="modal-footer border-secondary border-opacity-25">
          <button type="button" class="btn-eb-outline" data-bs-dismiss="modal">Cancel</button>
          <button type="button" class="btn btn-danger" data-confirm-delete>Delete event</button>
        </div>
      </div>
    </div>
  </div>
</section>
